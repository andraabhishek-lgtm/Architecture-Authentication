<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="404 page not found — RoleBase." />
  <title>404 | Page Not Found</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── SVG BACKGROUND ── */
    .bg-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 22px 52px;
      gap: 36px;
    }

    nav a {
      color: rgba(30,60,90,0.85);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.8px;
      transition: color 0.2s;
    }
    nav a:hover { color: #1a4060; }

    .nav-pill {
      background: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 20px;
      padding: 6px 20px;
      backdrop-filter: blur(8px);
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── GLASS CARD ── */
    .glass-card {
      background: rgba(200, 225, 245, 0.22);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1.5px solid rgba(255,255,255,0.45);
      border-radius: 28px;
      padding: 56px 52px 48px;
      width: 100%;
      max-width: 520px;
      text-align: center;
      box-shadow:
        0 8px 48px rgba(30,80,130,0.18),
        0 1px 0 rgba(255,255,255,0.5) inset;
    }

    /* eyebrow */
    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #3a7aaa;
      margin-bottom: 20px;
    }

    /* 404 number */
    .error-code {
      display: block;
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #4a90c0 0%, #2a5a8a 60%, #1a4070 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 16px rgba(42,90,140,0.25));
    }

    .error-divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #4a90c0, #2a5a8a);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .glass-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a3050;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .glass-card p.desc {
      font-size: 14px;
      color: #4a6a8a;
      line-height: 1.75;
      margin-bottom: 36px;
    }

    /* buttons */
    .hero-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 30px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn.primary {
      background: linear-gradient(135deg, #4a90c0, #2a6090);
      color: #fff;
      box-shadow: 0 4px 20px rgba(42,90,140,0.4);
    }

    .btn.secondary {
      background: rgba(255,255,255,0.45);
      border: 1.5px solid rgba(255,255,255,0.7);
      color: #1a3050;
      backdrop-filter: blur(10px);
    }

    .btn.secondary:hover { background: rgba(255,255,255,0.6); }

    .back-hint {
      margin-top: 28px;
      font-size: 13px;
      color: #4a6a8a;
    }

    .back-hint a {
      color: #2a6aaa;
      font-weight: 600;
      text-decoration: none;
      margin-left: 4px;
    }

    .back-hint a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .glass-card { padding: 44px 28px 36px; }
      .error-code { font-size: 80px; }
      .glass-card h1 { font-size: 18px; }
      .hero-actions { flex-direction: column; }
      .btn { width: 100%; }
      nav { padding: 18px 24px; gap: 20px; }
    }
  </style>
</head>
